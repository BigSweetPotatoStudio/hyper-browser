name: Bug report
description: Report a reproducible Hyper Browser bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hyper Browser version
      placeholder: "0.1.3"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "Pixel 8, Android 16"
    validations:
      required: true
  - type: dropdown
    id: abi
    attributes:
      label: APK architecture
      options:
        - arm64-v8a
        - armeabi-v7a
        - x86_64
        - Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add screenshots, logcat excerpts, or crash traces if available.
      render: text
