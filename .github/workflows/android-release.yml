name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "GitHub release name. Defaults to the tag or current commit."
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub Release with the signed APK."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build installable release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: internal-pages/pnpm-lock.yaml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build unsigned release APK
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/release/HyperBrowser-release.apk"
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "Unsigned release APK not found: $UNSIGNED_APK" >&2
            exit 1
          fi

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          else
            echo "No release keystore secrets found. Generating a temporary installable signing key."
            keytool -genkeypair \
              -keystore release.keystore \
              -storepass android \
              -alias hyper-browser-temp \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Hyper Browser CI,O=BigSweetPotatoStudio,C=US"
            KEYSTORE_PASSWORD="android"
            KEY_ALIAS="hyper-browser-temp"
            KEY_PASSWORD="android"
          fi

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED_APK"

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyperBrowser-release-apk
          path: app/build/outputs/apk/release/HyperBrowser-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          APK="app/build/outputs/apk/release/HyperBrowser-release.apk"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="ci-${GITHUB_SHA::7}"
          fi

          if [ -z "${RELEASE_NAME:-}" ]; then
            RELEASE_NAME="$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber
          else
            gh release create "$TAG" "$APK" --target "$GITHUB_SHA" --title "$RELEASE_NAME" --notes "Installable Hyper Browser release APK."
          fi
