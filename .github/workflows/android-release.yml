name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "GitHub release name. Defaults to the tag or current commit."
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub Release with the signed APK."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build installable release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: |
            internal-pages/pnpm-lock.yaml
            companion-extension/pnpm-lock.yaml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read release version
        id: version
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const gradle = fs.readFileSync("app/build.gradle.kts", "utf8");
          const versionCode = gradle.match(/versionCode\s*=\s*(\d+)/)?.[1];
          const versionName = gradle.match(/versionName\s*=\s*"([^"]+)"/)?.[1];

          if (!versionCode) throw new Error("versionCode not found in app/build.gradle.kts");
          if (!versionName) throw new Error("versionName not found in app/build.gradle.kts");
          const isPrerelease = versionName.includes("-");

          const ref = process.env.GITHUB_REF ?? "";
          const refName = process.env.GITHUB_REF_NAME ?? "";
          const sha = process.env.GITHUB_SHA ?? "";
          const tag = ref.startsWith("refs/tags/") ? refName : `ci-${sha.slice(0, 7)}`;

          if (ref.startsWith("refs/tags/v")) {
            const tagVersion = tag.slice(1);
            if (tagVersion !== versionName) {
              throw new Error(`Tag ${tag} does not match versionName ${versionName}`);
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_code=${versionCode}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_name=${versionName}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_prerelease=${isPrerelease}\n`);
          NODE

      - name: Extract release notes from changelog
        run: node scripts/extract-changelog-notes.mjs --version "${{ steps.version.outputs.version_name }}"

      - name: Install internal page dependencies
        run: pnpm --dir internal-pages install --frozen-lockfile

      - name: Check internal page TypeScript
        run: pnpm --dir internal-pages typecheck

      - name: Run sync tests
        run: pnpm test:sync

      - name: Install companion extension dependencies
        run: pnpm --dir companion-extension install --frozen-lockfile

      - name: Check companion extension TypeScript
        run: pnpm --dir companion-extension typecheck

      - name: Package companion extension
        run: pnpm --dir companion-extension zip

      - name: Collect companion extension packages
        run: |
          set -euo pipefail
          mkdir -p companion-extension-artifacts
          cp companion-extension/.output/*.zip companion-extension-artifacts/

      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain

      - name: Run Android lint
        run: ./gradlew :app:lintRelease --console=plain

      - name: Build unsigned release APKs
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Sign release APKs
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          APK_DIR="app/build/outputs/apk/release"
          SIGNED_DIR="$APK_DIR/signed"
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          mkdir -p "$SIGNED_DIR"

          mapfile -t UNSIGNED_APKS < <(find "$APK_DIR" -maxdepth 1 -type f -name "app-*-release-unsigned.apk" | sort)
          if [ "${#UNSIGNED_APKS[@]}" -eq 0 ]; then
            echo "No unsigned release split APKs found in $APK_DIR" >&2
            exit 1
          fi

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] ||
             [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] ||
             [ -z "${ANDROID_KEY_ALIAS:-}" ] ||
             [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "Missing Android release signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD before publishing." >&2
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          KEY_ALIAS="$ANDROID_KEY_ALIAS"
          KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

          for unsigned_apk in "${UNSIGNED_APKS[@]}"; do
            filename="$(basename "$unsigned_apk")"
            abi="${filename#app-}"
            abi="${abi%-release-unsigned.apk}"
            aligned_apk="$SIGNED_DIR/HyperBrowser-$abi-release-aligned.apk"
            signed_apk="$SIGNED_DIR/HyperBrowser-$abi-release.apk"

            "$BUILD_TOOLS/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks release.keystore \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$signed_apk" \
              "$aligned_apk"
            "$BUILD_TOOLS/apksigner" verify --verbose "$signed_apk"
            rm "$aligned_apk"
          done

          ls -lh "$SIGNED_DIR"

      - name: Upload signed release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperBrowser-release-apks
          path: app/build/outputs/apk/release/signed/*.apk
          if-no-files-found: error

      - name: Upload companion extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperBrowser-companion-extension
          path: companion-extension-artifacts/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          SIGNED_DIR="app/build/outputs/apk/release/signed"
          mapfile -t APKS < <(find "$SIGNED_DIR" -maxdepth 1 -type f -name "*.apk" | sort)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No signed release APKs found in $SIGNED_DIR" >&2
            exit 1
          fi
          mapfile -t EXTENSION_ZIPS < <(find "companion-extension-artifacts" -maxdepth 1 -type f -name "*.zip" | sort)
          if [ "${#EXTENSION_ZIPS[@]}" -eq 0 ]; then
            echo "No companion extension ZIPs found in companion-extension-artifacts" >&2
            exit 1
          fi

          TAG="${{ steps.version.outputs.tag }}"

          if [ -z "${RELEASE_NAME:-}" ]; then
            RELEASE_NAME="$TAG"
          fi

          CREATE_RELEASE_FLAGS=()
          EDIT_RELEASE_FLAGS=()
          if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
            CREATE_RELEASE_FLAGS+=(--prerelease --latest=false)
            EDIT_RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$RELEASE_NAME" --notes-file .release/release-notes.md "${EDIT_RELEASE_FLAGS[@]}"
            gh release upload "$TAG" "${APKS[@]}" "${EXTENSION_ZIPS[@]}" --clobber
          else
            gh release create "$TAG" "${APKS[@]}" "${EXTENSION_ZIPS[@]}" --target "$GITHUB_SHA" --title "$RELEASE_NAME" --notes-file .release/release-notes.md "${CREATE_RELEASE_FLAGS[@]}"
          fi

      - name: Update stable index on main
        if: startsWith(github.ref, 'refs/tags/v') && steps.version.outputs.is_prerelease != 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git pull --ff-only origin main
          node scripts/update-stable-index.mjs \
            --version-code "${{ steps.version.outputs.version_code }}" \
            --version-name "${{ steps.version.outputs.version_name }}" \
            --tag "${{ steps.version.outputs.tag }}" \
            --notes-file ".release/update-notes.txt"
          git add update/stable.json
          if git diff --cached --quiet; then
            echo "update/stable.json is already current."
          else
            git commit -m "Update stable index for ${{ steps.version.outputs.version_name }}"
            git push origin main
          fi

      - name: Skip stable index for prerelease
        if: startsWith(github.ref, 'refs/tags/v') && steps.version.outputs.is_prerelease == 'true'
        run: echo "Prerelease ${{ steps.version.outputs.version_name }} does not update update/stable.json."
