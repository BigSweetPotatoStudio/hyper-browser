name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "GitHub release name. Defaults to the tag or current commit."
        required: false
        type: string
      publish_release:
        description: "Publish a GitHub Release with the signed APK."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build installable release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: internal-pages/pnpm-lock.yaml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build unsigned release APKs
        run: ./gradlew :app:assembleRelease --console=plain

      - name: Sign release APKs
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          APK_DIR="app/build/outputs/apk/release"
          SIGNED_DIR="$APK_DIR/signed"
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          mkdir -p "$SIGNED_DIR"

          mapfile -t UNSIGNED_APKS < <(find "$APK_DIR" -maxdepth 1 -type f -name "app-*-release-unsigned.apk" | sort)
          if [ "${#UNSIGNED_APKS[@]}" -eq 0 ]; then
            echo "No unsigned release split APKs found in $APK_DIR" >&2
            exit 1
          fi

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
          else
            echo "No release keystore secrets found. Generating a temporary installable signing key."
            keytool -genkeypair \
              -keystore release.keystore \
              -storepass android \
              -alias hyper-browser-temp \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Hyper Browser CI,O=BigSweetPotatoStudio,C=US"
            KEYSTORE_PASSWORD="android"
            KEY_ALIAS="hyper-browser-temp"
            KEY_PASSWORD="android"
          fi

          for unsigned_apk in "${UNSIGNED_APKS[@]}"; do
            filename="$(basename "$unsigned_apk")"
            abi="${filename#app-}"
            abi="${abi%-release-unsigned.apk}"
            aligned_apk="$SIGNED_DIR/HyperBrowser-$abi-release-aligned.apk"
            signed_apk="$SIGNED_DIR/HyperBrowser-$abi-release.apk"

            "$BUILD_TOOLS/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks release.keystore \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$signed_apk" \
              "$aligned_apk"
            "$BUILD_TOOLS/apksigner" verify --verbose "$signed_apk"
            rm "$aligned_apk"
          done

          ls -lh "$SIGNED_DIR"

      - name: Upload signed release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HyperBrowser-release-apks
          path: app/build/outputs/apk/release/signed/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          SIGNED_DIR="app/build/outputs/apk/release/signed"
          mapfile -t APKS < <(find "$SIGNED_DIR" -maxdepth 1 -type f -name "*.apk" | sort)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No signed release APKs found in $SIGNED_DIR" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="ci-${GITHUB_SHA::7}"
          fi

          if [ -z "${RELEASE_NAME:-}" ]; then
            RELEASE_NAME="$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${APKS[@]}" --clobber
          else
            gh release create "$TAG" "${APKS[@]}" --target "$GITHUB_SHA" --title "$RELEASE_NAME" --notes "Installable Hyper Browser release APKs split by CPU architecture."
          fi
