name: Android CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: internal-pages/pnpm-lock.yaml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Install internal page dependencies
        run: pnpm --dir internal-pages install --frozen-lockfile

      - name: Check internal page TypeScript
        run: pnpm --dir internal-pages typecheck

      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --console=plain

  companion-extension:
    name: Build companion extension packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: companion-extension/pnpm-lock.yaml

      - name: Install companion extension dependencies
        run: pnpm --dir companion-extension install --frozen-lockfile

      - name: Check companion extension TypeScript
        run: pnpm --dir companion-extension typecheck

      - name: Package companion extension
        run: pnpm --dir companion-extension zip

      - name: Upload companion extension packages
        uses: actions/upload-artifact@v4
        with:
          name: HyperBrowser-companion-extension
          path: companion-extension/.output/*.zip
          if-no-files-found: error
