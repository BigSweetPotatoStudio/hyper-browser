<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bookmarks</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fd;
      color: #202124;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f8f9fd;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: calc(env(safe-area-inset-top) + 16px) 18px 16px;
      background: #f8f9fd;
    }

    .back {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #202124;
      font-size: 34px;
      line-height: 1;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 680;
    }

    main {
      padding: 8px 18px 34px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 52px;
      align-items: center;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .open {
      min-width: 0;
      padding: 18px;
      color: inherit;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .title,
    .url {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title {
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 650;
    }

    .url {
      color: #666b73;
      font-size: 14px;
    }

    .edit,
    .remove {
      width: 52px;
      height: 100%;
      border: 0;
      background: transparent;
      color: #5f6368;
      font-size: 22px;
    }

    .remove {
      font-size: 28px;
    }

    .editor {
      display: grid;
      grid-column: 1 / -1;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .editor input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: #202124;
      font: inherit;
      font-size: 15px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .editor-actions button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      font: inherit;
      font-weight: 650;
    }

    .save {
      background: #1a73e8;
      color: #fff;
    }

    .cancel {
      background: #e8eaed;
      color: #202124;
    }

    .empty {
      margin-top: 18px;
      padding: 20px;
      border-radius: 18px;
      background: #fff;
      color: #666b73;
      font-size: 16px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="hyper://home" aria-label="Back">‹</a>
    <h1>书签</h1>
  </header>
  <main id="content"></main>
  <script src="hyper-browser.js"></script>
  <script>
    let bookmarks = readBookmarks();
    let editingUrl = null;

    function readBookmarks() {
      const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
      const params = new URLSearchParams(hash);
      const raw = params.get("data");
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function render() {
      const content = document.getElementById("content");
      if (!bookmarks.length) {
        content.innerHTML = '<div class="empty">还没有书签。打开网页后可以从菜单添加。</div>';
        return;
      }
      const list = document.createElement("div");
      list.className = "list";
      bookmarks.forEach((bookmark) => {
        const item = document.createElement("div");
        item.className = "item";

        const open = document.createElement("a");
        open.className = "open";
        open.href = "#";
        open.addEventListener("click", (event) => {
          event.preventDefault();
          window.hyperBrowser.openBookmark(bookmark.url);
        });

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = bookmark.title || bookmark.url;

        const url = document.createElement("div");
        url.className = "url";
        url.textContent = bookmark.url;

        const edit = document.createElement("button");
        edit.className = "edit";
        edit.type = "button";
        edit.setAttribute("aria-label", "Edit bookmark");
        edit.textContent = "✎";
        edit.addEventListener("click", () => {
          editingUrl = bookmark.url;
          render();
        });

        const remove = document.createElement("button");
        remove.className = "remove";
        remove.type = "button";
        remove.setAttribute("aria-label", "Remove bookmark");
        remove.textContent = "×";
        remove.addEventListener("click", () => {
          bookmarks = bookmarks.filter((item) => item.url !== bookmark.url);
          if (editingUrl === bookmark.url) editingUrl = null;
          render();
          window.hyperBrowser.removeBookmark(bookmark.url);
        });

        open.append(title, url);
        item.append(open, edit, remove);

        if (editingUrl === bookmark.url) {
          const editor = document.createElement("form");
          editor.className = "editor";

          const titleInput = document.createElement("input");
          titleInput.name = "title";
          titleInput.value = bookmark.title || "";
          titleInput.placeholder = "标题";

          const urlInput = document.createElement("input");
          urlInput.name = "url";
          urlInput.value = bookmark.url;
          urlInput.placeholder = "URL";
          urlInput.type = "url";

          const actions = document.createElement("div");
          actions.className = "editor-actions";

          const cancel = document.createElement("button");
          cancel.className = "cancel";
          cancel.type = "button";
          cancel.textContent = "取消";
          cancel.addEventListener("click", () => {
            editingUrl = null;
            render();
          });

          const save = document.createElement("button");
          save.className = "save";
          save.type = "submit";
          save.textContent = "保存";

          editor.addEventListener("submit", (event) => {
            event.preventDefault();
            const nextTitle = titleInput.value.trim();
            const nextUrl = urlInput.value.trim();
            if (!nextUrl) return;
            const oldUrl = bookmark.url;
            bookmarks = bookmarks.map((item) => (
              item.url === oldUrl ? { ...item, title: nextTitle || nextUrl, url: nextUrl } : item
            ));
            editingUrl = null;
            render();
            window.hyperBrowser.editBookmark(oldUrl, nextTitle, nextUrl);
          });

          actions.append(cancel, save);
          editor.append(titleInput, urlInput, actions);
          item.appendChild(editor);
        }

        list.appendChild(item);
      });
      content.replaceChildren(list);
    }

    render();
  </script>
</body>
</html>
